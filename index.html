<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#fdfdfd">
    <title>LinkHub Pro - Pastel Edition</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* CSS SAMA SEPERTI SEBELUMNYA */
        :root {
            --bg-main: #fdfdfd;
            --primary: #2d3436;
            --accent: #a29bfe;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --surface: #ffffff;
            --border: #f1f2f6;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            --radius-lg: 20px;
            --radius-md: 14px;
            
            --pastel-1: #ffdadb; 
            --pastel-2: #fff3bf; 
            --pastel-3: #d3f9d8; 
            --pastel-4: #e7f5ff; 
            --pastel-5: #f3d9fa; 
            --pastel-6: #ffecdf; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
        .app-shell { width: 100%; max-width: 540px; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 0.5rem 0.5rem 0.5rem; }
        .nav-brand { font-weight: 800; font-size: 1.6rem; letter-spacing: -0.8px; color: var(--primary); margin-left: 0.5rem; }
        .nav-actions { display: flex; gap: 0.5rem; }

        .view { display: none; animation: fadeIn 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 1rem; }
        .form-title { font-size: 0.75rem; font-weight: 700; margin-bottom: 1.2rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; display: flex; justify-content: space-between; align-items: center; }
        .input-group { display: flex; flex-direction: column; gap: 0.8rem; }
        
        input { padding: 1rem 1.2rem; border: 2px solid transparent; border-radius: var(--radius-md); background: #f8f9fa; font-size: 0.95rem; transition: all 0.25s; }
        input:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(162, 155, 254, 0.15); }
        
        .btn { padding: 1rem; border-radius: var(--radius-md); border: none; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; margin-top: 0.5rem; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-cancel { background: transparent; color: var(--text-muted); margin-top: 0.5rem; padding: 0.5rem; font-size: 0.85rem; display: none; }
        .btn-cancel:hover { text-decoration: underline; color: var(--primary); }
        
        .btn-ghost { background: transparent; color: var(--text-muted); width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .btn-ghost:hover { background: #f1f2f6; color: var(--primary); }

        #linkList { display: flex; flex-direction: column; gap: 0.8rem; }
        .link-item { border: none; border-radius: var(--radius-md); padding: 1.2rem; display: flex; align-items: center; gap: 1rem; transition: transform 0.2s, box-shadow 0.2s; }
        .link-item:hover { transform: scale(1.02); }
        .drag-handle { cursor: grab; color: rgba(0,0,0,0.2); display: flex; }
        .link-content { flex: 1; min-width: 0; }
        .link-item-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; color: rgba(0,0,0,0.7); }
        .link-item-url { font-size: 0.85rem; color: rgba(0,0,0,0.4); text-decoration: none; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .item-actions { display: flex; gap: 0.4rem; }
        .btn-action { background: rgba(255,255,255,0.4); color: rgba(0,0,0,0.4); padding: 0.5rem; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-action:hover { background: #fff; }
        .btn-action.edit:hover { color: var(--accent); }
        .btn-action.delete:hover { color: #ff7675; }

        .settings-grid { display: grid; gap: 1rem; }
        .settings-card { background: #f8f9fa; padding: 1.2rem; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; }
        .settings-info h4 { font-size: 0.95rem; margin-bottom: 0.2rem; }
        .settings-info p { font-size: 0.8rem; color: var(--text-muted); }

        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 0.8rem 1.8rem; border-radius: 50px; font-size: 0.85rem; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="app-shell">
    <nav>
        <div class="nav-brand">LinkHub</div>
        <div class="nav-actions">
            <button class="btn btn-ghost" onclick="toggleView('main')" id="closeBtn" style="display:none" title="Tutup">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <button class="btn btn-ghost" onclick="toggleView('settings')" id="settingsBtn" title="Pengaturan">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>
    </nav>

    <main id="mainView" class="view active">
        <div class="card">
            <h3 class="form-title" id="formTitle">Tambah Baru</h3>
            <form id="linkForm" class="input-group">
                <input type="text" id="titleInput" placeholder="Judul Tautan" required>
                <input type="url" id="urlInput" placeholder="URL (https://...)" required>
                <button type="submit" id="submitBtn" class="btn btn-primary">Tambah ke Daftar</button>
                <button type="button" id="cancelBtn" class="btn btn-cancel" onclick="cancelEdit()">Batal Edit</button>
            </form>
        </div>
        <div id="linkList"></div>
    </main>

    <section id="settingsView" class="view">
        <div class="settings-grid">
            <div class="settings-card">
                <div class="settings-info">
                    <h4>Export Backup</h4>
                    <p>Simpan data ke file JSON.</p>
                </div>
                <button class="btn btn-ghost" onclick="exportData()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></button>
            </div>
            <div class="settings-card">
                <div class="settings-info">
                    <h4>Import Backup</h4>
                    <p>Muat data dari file JSON.</p>
                </div>
                <input type="file" id="importFile" accept=".json" style="display: none;">
                <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg></button>
            </div>
            <div class="settings-card" style="background: #fff5f5;">
                <div class="settings-info">
                    <h4 style="color: #fa5252;">Reset Data</h4>
                    <p>Hapus semua isi daftar.</p>
                </div>
                <button class="btn btn-ghost" style="color: #fa5252;" onclick="resetData()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div>
        </div>
    </section>
</div>

<div id="toast">Notifikasi</div>

<script>
    // --- PWA SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Service Worker registered!', reg.scope))
                .catch(err => console.log('Service Worker registration failed: ', err));
        });
    }

    // --- APP LOGIC ---
    const STORAGE_KEY = 'linkhub_pastel_data';
    const PASTELS = ['var(--pastel-1)', 'var(--pastel-2)', 'var(--pastel-3)', 'var(--pastel-4)', 'var(--pastel-5)', 'var(--pastel-6)'];
    
    let links = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editId = null;

    const el = document.getElementById('linkList');
    Sortable.create(el, {
        animation: 250,
        handle: '.drag-handle',
        onEnd: function() {
            const newOrder = [];
            document.querySelectorAll('.link-item').forEach(item => {
                const id = parseInt(item.getAttribute('data-id'));
                newOrder.push(links.find(l => l.id === id));
            });
            links = newOrder;
            saveData();
        }
    });

    function toggleView(view) {
        document.getElementById('mainView').classList.toggle('active', view === 'main');
        document.getElementById('settingsView').classList.toggle('active', view === 'settings');
        document.getElementById('settingsBtn').style.display = view === 'main' ? 'flex' : 'none';
        document.getElementById('closeBtn').style.display = view === 'settings' ? 'flex' : 'none';
    }

    function renderLinks() {
        const listContainer = document.getElementById('linkList');
        listContainer.innerHTML = '';
        if (links.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 3rem; color: #adb5bd; font-size: 0.9rem;">Daftar masih kosong.</div>`;
            return;
        }

        links.forEach((item, index) => {
            const color = PASTELS[index % PASTELS.length]; 
            const div = document.createElement('div');
            div.className = 'link-item';
            div.style.backgroundColor = color;
            div.setAttribute('data-id', item.id);
            div.innerHTML = `
                <div class="drag-handle" title="Tahan dan geser"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6a2 2 0 11-4 0 2 2 0 014 0zM8 12a2 2 0 11-4 0 2 2 0 014 0zM8 18a2 2 0 11-4 0 2 2 0 014 0zM20 6a2 2 0 11-4 0 2 2 0 014 0zM20 12a2 2 0 11-4 0 2 2 0 014 0zM20 18a2 2 0 11-4 0 2 2 0 014 0z"/></svg></div>
                <div class="link-content">
                    <div class="link-item-title">${escapeHTML(item.title)}</div>
                    <a href="${escapeHTML(item.url)}" target="_blank" class="link-item-url">${escapeHTML(item.url)}</a>
                </div>
                <div class="item-actions">
                    <button class="btn-action edit" onclick="editLink(${item.id})" title="Edit"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
                    <button class="btn-action delete" onclick="deleteLink(${item.id})" title="Hapus"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>
            `;
            listContainer.appendChild(div);
        });
    }

    function editLink(id) {
        const linkToEdit = links.find(l => l.id === id);
        if (!linkToEdit) return;
        document.getElementById('titleInput').value = linkToEdit.title;
        document.getElementById('urlInput').value = linkToEdit.url;
        editId = id;
        document.getElementById('formTitle').innerText = 'Edit Tautan';
        document.getElementById('submitBtn').innerText = 'Simpan Perubahan';
        document.getElementById('cancelBtn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('titleInput').focus();
    }

    function cancelEdit() {
        editId = null;
        document.getElementById('linkForm').reset();
        document.getElementById('formTitle').innerText = 'Tambah Baru';
        document.getElementById('submitBtn').innerText = 'Tambah ke Daftar';
        document.getElementById('cancelBtn').style.display = 'none';
    }

    document.getElementById('linkForm').addEventListener('submit', (e) => {
        e.preventDefault();
        let url = document.getElementById('urlInput').value;
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url; // Otomatis tambah https
        
        const title = document.getElementById('titleInput').value;

        if (editId !== null) {
            const index = links.findIndex(l => l.id === editId);
            if (index !== -1) { links[index].title = title; links[index].url = url; }
            showToast('Perubahan disimpan ✨');
        } else {
            links.unshift({ id: Date.now(), title, url });
            showToast('Tautan disimpan ✨');
        }
        saveData(); renderLinks(); cancelEdit();
    });

    function deleteLink(id) {
        if (editId === id) cancelEdit();
        links = links.filter(l => l.id !== id);
        saveData(); renderLinks(); showToast('Tautan dihapus');
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(links)); }
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(links, null, 2)], { type: 'application/json' }));
        a.download = 'LinkHub_Backup.json'; a.click(); showToast('Data diexport');
    }

    document.getElementById('importFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try { links = JSON.parse(event.target.result); saveData(); renderLinks(); showToast('Data diimport'); toggleView('main'); } 
            catch (err) { alert('File tidak valid'); }
        };
        reader.readAsText(file);
    });

    function resetData() {
        if(confirm('Hapus semua data?')) { links = []; saveData(); renderLinks(); cancelEdit(); showToast('Data dibersihkan'); toggleView('main'); }
    }

    function escapeHTML(str) { const p = document.createElement('p'); p.textContent = str; return p.innerHTML; }
    renderLinks();
</script>

</body>
</html>
